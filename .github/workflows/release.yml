name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release:
    if: github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GH_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "semantic-release-bot"
          git config user.email "semantic-release-bot@users.noreply.github.com"

      - name: Run semantic release
        continue-on-error: true
        uses: jedi-knights/go-semantic-release@v0.10.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          # go-semantic-release may partially complete (tag pushed, publish failed).
          # Scan all tags and create GitHub Releases for any that are missing one.
          # This is idempotent: existing releases are skipped.
          LATEST_TAG=""
          for TAG in $(git tag --sort=version:refname); do
            if ! gh release view "${TAG}" > /dev/null 2>&1; then
              echo "Creating release for ${TAG}"
              gh release create "${TAG}" --title "${TAG}" --generate-notes --verify-tag
              LATEST_TAG="${TAG}"
            fi
          done
          if [ -n "${LATEST_TAG}" ]; then
            echo "${LATEST_TAG#v}" > VERSION
            echo "VERSION set to ${LATEST_TAG#v}"
          elif [ ! -f VERSION ]; then
            echo "No new tags without releases — nothing to do."
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Update version files
        run: |
          if [ -f VERSION ]; then
            NEW_VERSION=$(cat VERSION)
            sed -i "s/^version = \".*\"/version = \"${NEW_VERSION}\"/" pyproject.toml
          fi

      - name: Commit generated files
        run: |
          if [ ! -f VERSION ]; then
            echo "No new version released — nothing to commit."
            exit 0
          fi
          git add VERSION pyproject.toml
          if [ -f CHANGELOG.md ]; then git add CHANGELOG.md; fi
          git diff --cached --quiet || git commit -m "chore(release): update version files [skip ci]"
          git push origin HEAD:main

      - name: Update floating major-version tag
        run: |
          if [ ! -f VERSION ]; then
            echo "No new version released — skipping floating tag update."
            exit 0
          fi
          MAJOR="v$(cut -d. -f1 VERSION)"
          git tag -fa "${MAJOR}" -m "Release ${MAJOR} (floating)"
          git push origin "${MAJOR}" --force

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: |
          if [ ! -f VERSION ]; then
            echo "No new version released — skipping deployment."
            exit 0
          fi
          flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
