name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore: ['docs/**', '*.md']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.py'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'tasks.py'
              - 'Dockerfile'
              - '.github/workflows/**'

  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv sync --frozen
      - run: uv run invoke lint

  complexity:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv sync --frozen
      - run: uv run invoke check-complexity

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv sync --frozen
      - run: uv run invoke coverage

  ci:
    if: always()
    needs: [lint, complexity, test]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || \
                "${{ needs.complexity.result }}" == "failure" || \
                "${{ needs.test.result }}" == "failure" ]]; then
            exit 1
          fi

