# fly.toml app configuration file generated for jk-mcp-nwsl on 2026-04-25T18:14:07-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'jk-mcp-nwsl'
primary_region = 'iad'

[build]

[env]
  MCP_TRANSPORT = "streamable-http"
  PORT = "8000"
  # Served at /mcp/nwsl so the api-gateway can namespace many MCP servers under
  # /mcp/<name> with plain pass-through routing (no path rewriting).
  MCP_PATH = "/mcp/nwsl"

[http_service]
  internal_port = 8000
  # Private service behind the api-gateway (public IPs released). The gateway
  # reaches it over flycast — a private IP via Fly's proxy — on plain HTTP, so
  # HTTPS must not be forced on the internal hop (the gateway terminates TLS at
  # the edge). The proxy also auto-starts the machine, preserving scale-to-zero.
  force_https = false
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
