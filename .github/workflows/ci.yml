name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore: ['docs/**', '*.md']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.py'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'tasks.py'
              - 'Dockerfile'
              - '.github/workflows/**'

  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv sync --frozen
      - run: uv run invoke lint

  complexity:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv sync --frozen
      - run: uv run invoke check-complexity

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv sync --frozen
      - run: uv run invoke coverage

  ci:
    if: always()
    needs: [lint, complexity, test]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || \
                "${{ needs.complexity.result }}" == "failure" || \
                "${{ needs.test.result }}" == "failure" ]]; then
            exit 1
          fi

  badge:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv sync --frozen
      - run: uv run pytest --cov=src/nwsl --cov-report=html --cov-report=xml
      - name: Update coverage badge
        uses: jedi-knights/coverage-badge@v0
        env:
          REPORT_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/?v=${{ github.run_number }}
      - name: Commit badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (git add README.md && git commit -m "chore: update coverage badge [skip ci]" && git push)
      - uses: actions/upload-pages-artifact@v5
        with:
          path: htmlcov/
      - id: deploy
        uses: actions/deploy-pages@v5
